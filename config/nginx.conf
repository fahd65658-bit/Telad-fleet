# ═══════════════════════════════════════════════════════════════════════
# TELAD FLEET – Nginx reverse proxy configuration
# Domain: fna.sa  |  API: api.fna.sa
# ═══════════════════════════════════════════════════════════════════════

upstream telad_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name fna.sa www.fna.sa api.fna.sa;
    return 301 https://$host$request_uri;
}

# API server
server {
    listen 443 ssl http2;
    server_name api.fna.sa;

    ssl_certificate     /etc/letsencrypt/live/fna.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fna.sa/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options            DENY;
    add_header X-Content-Type-Options     nosniff;
    add_header X-XSS-Protection           "1; mode=block";
    add_header Referrer-Policy            "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req zone=api burst=50 nodelay;

    # API proxy
    location / {
        proxy_pass         http://telad_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering    off;
    }

    # Health check (no rate limit)
    location /health {
        limit_req off;
        proxy_pass http://telad_backend/health;
    }
}

# Frontend server
server {
    listen 443 ssl http2;
    server_name fna.sa www.fna.sa;

    ssl_certificate     /etc/letsencrypt/live/fna.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fna.sa/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/fna.sa;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets – long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

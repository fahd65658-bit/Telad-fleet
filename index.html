<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="TELAD FLEET – نظام إدارة الأسطول المتكامل">
  <title>TELAD FLEET – لوحة التحكم</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- ═══════ Header ══════════════════════════════════════════════════════════ -->
  <header class="hero">
    <div>
      <p class="eyebrow">fna.sa — نظام إدارة الأسطول</p>
      <h1>TELAD FLEET</h1>
      <p class="subtext">مراقبة المركبات والسائقين في الوقت الفعلي</p>
    </div>
    <button id="refreshBtn" class="primary-btn">تحديث البيانات</button>
  </header>

  <!-- ═══════ Main Content ════════════════════════════════════════════════════ -->
  <main class="container">

    <!-- Meta / status bar -->
    <div class="meta-panel">
      <span id="apiStatus">جاري الاتصال بالخادم...</span>
      <span id="syncStatus"></span>
    </div>

    <!-- Stats cards -->
    <section id="statsGrid" class="stats-grid" aria-label="إحصائيات الأسطول">
      <article class="card">
        <span>جارٍ التحميل...</span>
        <strong>—</strong>
      </article>
    </section>

    <!-- Fleet table + alerts -->
    <div class="two-col">

      <!-- Fleet table -->
      <div class="panel" style="padding:1rem">
        <div class="panel-head">
          <h2 style="font-size:1rem;margin:0">المركبات</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>المركبة</th>
                <th>السائق</th>
                <th>الحالة</th>
                <th>الموقع</th>
              </tr>
            </thead>
            <tbody id="fleetTableBody">
              <tr>
                <td colspan="4" class="empty-row">جارٍ التحميل...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Alerts -->
      <div class="panel" style="padding:1rem">
        <div class="panel-head">
          <h2 style="font-size:1rem;margin:0">التنبيهات</h2>
          <span id="alertsBadge" class="badge warn">0 جديد</span>
        </div>
        <ul id="alertsList" class="alerts">
          <li class="empty-state">جارٍ التحميل...</li>
        </ul>
      </div>

    </div>
  </main>

  <!-- ═══════ Footer ══════════════════════════════════════════════════════════ -->
  <footer class="footer-note">
    <small>TELAD FLEET v2.1.0 &mdash; &copy; 2025 fna.sa &mdash; جميع الحقوق محفوظة</small>
  </footer>

  <script src="/app.js"></script>
</body>
</html>

version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: telad-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       telad_fleet
      POSTGRES_USER:     telad
      POSTGRES_PASSWORD: ${DB_PASSWORD:-telad2024secure}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telad -d telad_fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (for refresh-token whitelist & rate limiting in prod) ──
  redis:
    image: redis:7-alpine
    container_name: telad-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-telad-redis-2024}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-telad-redis-2024}", "ping"]
      interval: 10s
      retries: 3

  # ─── Backend (Node/Express + Socket.IO) ────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: telad-backend
    restart: unless-stopped
    environment:
      NODE_ENV:            production
      PORT:                3000
      DATABASE_URL:        postgres://telad:${DB_PASSWORD:-telad2024secure}@db:5432/telad_fleet
      REDIS_URL:           redis://:${REDIS_PASSWORD:-telad-redis-2024}@redis:6379
      JWT_SECRET:          ${JWT_SECRET:-change-me-in-production!}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET:-change-refresh-secret-too!}
      JWT_EXPIRES_IN:      15m
      ADMIN_PASSWORD:      ${ADMIN_PASSWORD:-telad2024}
      OPENAI_API_KEY:      ${OPENAI_API_KEY:-}
      OPENAI_MODEL:        ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      GPS_SIMULATE:        ${GPS_SIMULATE:-false}
      GPS_PUSH_TOKEN:      ${GPS_PUSH_TOKEN:-}
      CORS_ORIGIN:         ${CORS_ORIGIN:-https://fna.sa,https://api.fna.sa}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - fleet_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf https://api.fna.sa/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── React Dashboard (built, served via nginx) ─────────────
  react-dashboard:
    build:
      context: ./react-dashboard
      dockerfile: ../Dockerfile
      target: react-build
    container_name: telad-react
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ─── Nginx reverse-proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: telad-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - react-dashboard

volumes:
  pg_data:
  fleet_data:
  nginx_logs:

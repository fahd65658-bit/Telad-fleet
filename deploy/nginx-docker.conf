# ═══════════════════════════════════════════════════════════════════════
# TELAD FLEET – nginx Docker Config
# Used by: docker-compose.yml (root)
# Routes:
#   /api/*       → backend (Node/Express) on port 3000
#   /socket.io/* → backend (WebSocket)
#   /*           → react-dashboard (built Vite/React) on port 80
# ═══════════════════════════════════════════════════════════════════════

upstream backend {
    server backend:3000;
    keepalive 32;
}

upstream react_dashboard {
    server react-dashboard:80;
    keepalive 16;
}

# ─── HTTP server ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Increase buffer for WebSocket upgrade headers
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── API endpoints ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10m;
    }

    # ── WebSocket (Socket.IO) ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # ── Health checks (direct to backend) ─────────────────────────────
    location ~ ^/(healthz|api/health|api/version)$ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── React Dashboard (everything else) ─────────────────────────────
    location / {
        proxy_pass         http://react_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}


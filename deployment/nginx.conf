# ═══════════════════════════════════════════════════════════════════════
# TELAD FLEET – nginx Configuration
# Domains: fna.sa  |  www.fna.sa  |  api.fna.sa
#
# Place at: /etc/nginx/sites-available/telad-fleet
# Enable:   ln -s /etc/nginx/sites-available/telad-fleet /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════

# ─── Upstream Node.js backend (keep-alive pool) ──────────────────────────────
upstream telad_backend {
    server 127.0.0.1:5000;
    keepalive 32;            # maintain up to 32 idle keep-alive connections
}

# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fna.sa www.fna.sa api.fna.sa;
    return 301 https://$host$request_uri;
}

# ─── Frontend: fna.sa / www.fna.sa ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fna.sa www.fna.sa;

    # SSL — issued by Certbot (see deploy.sh)
    ssl_certificate     /etc/letsencrypt/live/fna.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fna.sa/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # TLS session reuse — reduces handshake overhead
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN always;
    add_header X-Content-Type-Options     nosniff    always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;

    root  /var/www/telad-fleet/frontend;
    index index.html;

    # SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/font-woff2 font/woff2;
}

# ─── Backend API: api.fna.sa ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.fna.sa;

    ssl_certificate     /etc/letsencrypt/live/fna.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fna.sa/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Node.js backend using upstream keep-alive pool

    # WebSocket support (Socket.io) — must come before the catch-all '/' location
    location /socket.io/ {
        proxy_pass          http://telad_backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    location / {
        proxy_pass          http://telad_backend;
        proxy_http_version  1.1;

        # Keep-alive to upstream
        proxy_set_header    Connection "";

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Regular API timeouts (generous but not infinite)
        proxy_connect_timeout 5s;
        proxy_read_timeout    35s;
        proxy_send_timeout    35s;

        # Upload size
        client_max_body_size 10m;

        # Pass through gzip from upstream
        proxy_set_header    Accept-Encoding "gzip";
    }
}

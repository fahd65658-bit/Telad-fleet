# ═══════════════════════════════════════════════════════════════════════
# TELAD FLEET – nginx Configuration
# Domains: fna.sa  |  www.fna.sa  |  api.fna.sa
#
# Place at: /etc/nginx/sites-available/telad-fleet
# Enable:   ln -s /etc/nginx/sites-available/telad-fleet /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════

# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fna.sa www.fna.sa api.fna.sa;
    return 301 https://$host$request_uri;
}

# ─── Frontend: fna.sa / www.fna.sa ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fna.sa www.fna.sa;

    # SSL — issued by Certbot (see deploy.sh)
    ssl_certificate     /etc/letsencrypt/live/fna.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fna.sa/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN always;
    add_header X-Content-Type-Options     nosniff    always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;

    root  /var/www/telad-fleet/frontend;
    index index.html;

    # SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}

# ─── Backend API: api.fna.sa ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.fna.sa;

    ssl_certificate     /etc/letsencrypt/live/fna.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fna.sa/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── GitHub App Webhook ──────────────────────────────────────────
    # مهم: proxy_request_buffering off للحفاظ على raw body لـ HMAC
    # تنبيه أمني: إبقاء client_max_body_size محدوداً لمنع إساءة الاستخدام.
    location /api/github/webhook {
        proxy_pass              http://127.0.0.1:5000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size    5m;
    }

    # Proxy to Node.js backend on port 5000
    location / {
        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;

        # WebSocket support (Socket.io)
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Timeouts — keep WebSocket alive
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;

        # Upload size
        client_max_body_size 10m;
    }
}

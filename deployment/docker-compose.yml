# ═══════════════════════════════════════════════════════════════════════
# TELAD FLEET – Docker Compose (Full Stack)
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/Dockerfile
    container_name: telad-fleet-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "127.0.0.1:5000:5000"   # Only expose to localhost (nginx proxies externally)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - telad-net
    volumes:
      - backend-logs:/app/logs

  # ── PostgreSQL Database ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: telad-fleet-db
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_DB:       ${DB_NAME:-telad_fleet}
      POSTGRES_USER:     ${DB_USER:-telad_user}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-telad_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telad-net

  # ── Nginx (SSL termination + static frontend) ──────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: telad-fleet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/telad-fleet.conf:ro
      - ./frontend:/var/www/telad-fleet/frontend:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - telad-net

volumes:
  pgdata:
  backend-logs:
  letsencrypt:

networks:
  telad-net:
    driver: bridge

# ═══════════════════════════════════════════════════════════════════════
# TELAD FLEET – Docker Compose (Full Stack)
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: backend
    container_name: telad-fleet-backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATA_DIR: /app/data
      BACKUP_DIR: /app/backups
    ports:
      - "127.0.0.1:5000:5000"   # Only expose to localhost (nginx proxies externally)
    networks:
      - telad-net
    volumes:
      - telad-data:/app/data
      - telad-backups:/app/backups
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx (SSL termination + static frontend) ──────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: telad-fleet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/telad-fleet.conf:ro
      - ../frontend:/var/www/telad-fleet/frontend:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - telad-net

volumes:
  telad-data:
  telad-backups:
  backend-logs:
  letsencrypt:

networks:
  telad-net:
    driver: bridge

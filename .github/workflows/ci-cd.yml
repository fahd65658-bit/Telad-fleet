name: TELAD FLEET CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: اختبار وفحص الكود ───
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check syntax (dry-run)
        working-directory: backend
        run: node --check server.js && node --check db.js

      - name: Health check test
        working-directory: backend
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 3
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          kill $SERVER_PID
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Health check failed with status $RESPONSE"
            exit 1
          fi
          echo "✅ Health check passed"

  # ─── Job 2: فحص أمني ───
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Audit dependencies
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          echo "Checking for hardcoded secrets..."
          # Fail if real passwords/keys are found (not placeholders)
          if grep -rn "OPENAI_API_KEY=sk-" --include="*.js" --include="*.env" --include="*.json" . 2>/dev/null | grep -v ".env.example" | grep -v "node_modules"; then
            echo "❌ Found hardcoded API key!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  # ─── Job 3: بناء Docker image ───
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd backend
          docker build -f ../deployment/Dockerfile -t telad-fleet-backend:${{ github.sha }} .
          echo "✅ Docker image built successfully"

  # ─── Job 4: نشر تلقائي (فقط عند push إلى main) ───
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security, docker-build]
    permissions: {}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/telad-fleet
            git pull origin main
            cd backend
            npm ci --omit=dev
            pm2 restart telad-fleet || pm2 start ../deployment/pm2.config.js --env production
            echo "✅ TELAD FLEET deployed successfully"

name: GitHub App Health Check

on:
  schedule:
    # Run every 6 hours.
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check fna.sa
        run: curl -fsSL --max-time 20 https://fna.sa > /dev/null

      - name: Check API health
        run: curl -fsSL --max-time 20 https://api.fna.sa/api/health > /dev/null

      - name: Check GitHub App health
        run: curl -fsSL --max-time 20 https://api.fna.sa/api/github/health > /dev/null

name: GitHub App Health Check

on:
  schedule:
    # Run every 6 hours.
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Check GitHub App Status
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check API Health
        run: |
          STATUS=$(curl -sf https://api.fna.sa/api/github/health | jq -r '.status' || echo "unreachable")
          echo "GitHub App Status: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "::warning::GitHub App health check failed: $STATUS"
          fi

      - name: Check Main Site
        run: |
          HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" https://fna.sa)
          echo "fna.sa HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::fna.sa returned HTTP $HTTP_CODE"
          fi

      - name: Check API Health Endpoint
        run: |
          HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" https://api.fna.sa/api/health)
          echo "API Health HTTP Status: $HTTP_CODE"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check fna.sa
        run: curl -fsSL --max-time 20 https://fna.sa > /dev/null

      - name: Check API health
        run: curl -fsSL --max-time 20 https://api.fna.sa/api/health > /dev/null

      - name: Check GitHub App health
        run: curl -fsSL --max-time 20 https://api.fna.sa/api/github/health > /dev/null

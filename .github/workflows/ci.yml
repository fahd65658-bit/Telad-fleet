name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@c2f7d6a75d9de3144a923a0ca6b77cbf10c1b5c0

      - name: Set up Node.js 18
        uses: actions/setup-node@3ea46f4c1d8bfb8b6d3c6c1f4a0ef0baf4d8a4d6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Validate server syntax
        run: cd backend && node --check server.js
        env:
          DEPLOY_ID: ${{ github.sha }}

      - name: Install root dependencies
        run: npm ci

      - name: Lint all server files
        run: npm run lint

      - name: Set up Python
        uses: actions/setup-python@d849f3cdd0b5b6f1d8d1f9f6f7b2c0d5a8b0a9f1
        with:
          python-version: '3.12'

      - name: Run Python tests
        run: npm test

# Notes:
# - This workflow pins all GitHub Actions to full commit SHAs to satisfy repository policy.
# - It preserves the existing install, lint, and test flow.
# - The job runs on ubuntu-latest for main and develop pushes and on main pull requests.
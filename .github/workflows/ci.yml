name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Validate server syntax
        run: cd backend && node --check server.js
        env:
          DEPLOY_ID: ${{ github.sha }}

      - name: Install root dependencies
        run: npm ci

      - name: Lint all server files
        run: npm run lint

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Run Python tests
        run: npm test

# Notes:
# - This workflow pins all GitHub Actions to full commit SHAs to satisfy repository policy.
# - It preserves the existing install, lint, and test flow.
# - The job runs on ubuntu-latest for main and develop pushes and on main pull requests.
